<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cool Todo List XD</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body>
    
    <div class="container">

        <div id="sidebar">
            

            <div class="project-nav-element">
                <div class="project-nav-element-small">
                    <div id="my-projects">My Projects</div>
                    <button id="add-project-button">+</button>
                </div>
                <div id="projects-container"></div>
           
                <form id="project-form">
                    <div>
                        <label for="project-name">Project name?</label>
                        <input type="text" name="project-name" id="project-name-input">
                    </div>
                    <button type="button" id="project-cancel-button">cancel</button>
                    <button type="button" id="project-save-button">save</button>
                </form>
            </div>
            
            

        </div>
        <div id="content">
            <h1>Cool todo list!</h1>
           
                <h2>Gym?</h2>
                <h2>Pending work?</h2>
                <h2>Brush your teeth?</h2>
                <h2>Make your bed?</h2>
                <h2>Sleep?</h2>
            
            
        </div>
    </div>
</body>

</html>
